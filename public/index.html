<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبر التجربة - Free Work</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 90%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .logo {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .login-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-google {
            background: #db4437;
            color: white;
        }

        .btn-google:hover {
            background: #c1351c;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(219, 68, 55, 0.4);
        }

        .btn-apple {
            background: #000;
            color: white;
        }

        .btn-apple:hover {
            background: #333;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        .icon {
            font-size: 20px;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }

        .error {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .error.show {
            display: block;
        }

        .firebase-badge {
            background: #FFA500;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🚀</div>
            <h1>اختبر التجربة</h1>
            <p class="subtitle">تسجيل دخول سريع وآمن</p>
            <div class="firebase-badge">🔥 مدعوم بـ Firebase</div>
        </div>

        <div id="error" class="error"></div>

        <div class="login-options">
            <a href="/api/auth/google" class="btn btn-google">
                <span class="icon">🔵</span>
                تسجيل الدخول عن طريق Google
            </a>

            <a href="/api/auth/apple" class="btn btn-apple">
                <span class="icon">🍎</span>
                تسجيل الدخول عن طريق Apple
            </a>
        </div>

        <div class="footer">
            <p>✨ منصة آمنة وموثوقة</p>
            <p>© 2024 Free Work Platform</p>
            <p>البيانات مخزنة بأمان على Firebase ☁️</p>
        </div>
    </div>

    <script>
        // عرض رسائل الخطأ من URL
        const params = new URLSearchParams(window.location.search);
        const error = params.get('error');
        if (error) {
            const errorDiv = document.getElementById('error');
            errorDiv.classList.add('show');
            if (error === 'auth_failed') {
                errorDiv.textContent = '❌ فشل التحقق. حاول مرة أخرى';
            } else if (error === 'processing_failed') {
                errorDiv.textContent = '❌ حدث خطأ أثناء المعالجة';
            }
        }
    </script>
</body>
</html>
