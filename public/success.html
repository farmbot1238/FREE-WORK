<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم التجربة بنجاح! 🎉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .message {
            color: #333;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .user-info {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: right;
        }

        .user-info h2 {
            color: #667eea;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .info-item {
            color: #666;
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #999;
            font-size: 12px;
        }

        .info-value {
            color: #333;
            font-weight: 600;
            margin-top: 3px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: #e74c3c;
            display: none;
            margin-bottom: 20px;
        }

        .success-badge {
            display: inline-block;
            background: #2ecc71;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">🎉</div>
        <div class="success-badge">✅ تم التجربة بنجاح</div>

        <h1>مرحباً بك!</h1>
        <p class="message">تم تسجيل دخولك بنجاح إلى منصة Free Work</p>

        <div id="error" class="error"></div>

        <div id="userInfo" class="user-info" style="display: none;">
            <h2>📋 بيانات المستخدم</h2>
            <div class="info-item">
                <div class="info-label">البريد الإلكتروني:</div>
                <div class="info-value" id="userEmail">جاري التحميل...</div>
            </div>
            <div class="info-item">
                <div class="info-label">الاسم:</div>
                <div class="info-value" id="userName">جاري التحميل...</div>
            </div>
            <div class="info-item">
                <div class="info-label">المعرف:</div>
                <div class="info-value" id="userId">جاري التحميل...</div>
            </div>
        </div>

        <div id="loading" style="text-align: center; margin-bottom: 20px;">
            <div class="loading"></div>
            <p style="color: #666; margin-top: 10px;">جاري تحميل البيانات...</p>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="goHome()">العودة للرئيسية</button>
            <button class="btn btn-secondary" onclick="logout()">تسجيل الخروج</button>
        </div>
    </div>

    <script>
        // استخراج بيانات المستخدم من URL
        function getUserDataFromURL() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const userParam = params.get('user');

            if (userParam) {
                try {
                    const user = JSON.parse(decodeURIComponent(userParam));
                    displayUserInfo(user);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('userInfo').style.display = 'block';
                } catch (e) {
                    console.error('خطأ في تحليل بيانات المستخدم:', e);
                }
            }

            // حفظ التوكن في localStorage
            if (token) {
                localStorage.setItem('authToken', token);
            }
        }

        // عرض بيانات المستخدم
        function displayUserInfo(user) {
            document.getElementById('userEmail').textContent = user.email || 'غير متوفر';
            document.getElementById('userName').textContent = user.name || 'مستخدم';
            document.getElementById('userId').textContent = user.id || 'غير متوفر';
        }

        // الذهاب للرئيسية
        function goHome() {
            window.location.href = '/';
        }

        // تسجيل الخروج
        function logout() {
            fetch('http://localhost:5000/api/auth/logout')
                .then(res => res.json())
                .then(data => {
                    localStorage.removeItem('authToken');
                    window.location.href = '/';
                })
                .catch(err => {
                    console.error('خطأ في تسجيل الخروج:', err);
                    alert('حدث خطأ في تسجيل الخروج');
                });
        }

        // استدعاء البيانات عند تحميل الصفحة
        window.addEventListener('load', getUserDataFromURL);
    </script>
</body>
</html>
